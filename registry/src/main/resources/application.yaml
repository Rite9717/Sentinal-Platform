server:
  port: 8080

spring:
  application:
    name: registry
  datasource:
    url: jdbc:mysql://localhost:3306/sentinal_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ritesh85
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
            redirect-uri: "http://localhost:8080/login/oauth2/code/google"
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub
  mail:
    host: smtp.gmail.com
    port: 587
    username: your-email@gmail.com
    password: your-app-password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

app:
  oauth2:
    redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:3000/oauth2/callback}

logging:
  level:
    com.sentinal: DEBUG
    org.springframework.security: DEBUG

aws:
  region: ${AWS_REGION}
  accessKeyId: ${AWS_ACCESS_KEY_ID}
  secretAccessKey: ${AWS_SECRET_ACCESS_KEY}

prometheus:
  url: http://your-ec2-ip:9090

sentinel:
  ai:
    service:
      url: ${SENTINEL_AI_URL:http://localhost:8000}
      enabled: ${SENTINEL_AI_ENABLED:false}
      timeout: 240000
  metrics:
    snapshot:
      # Phase 1 storage control: reduce write frequency for stable UP instances.
      up-steady-interval-seconds: ${SENTINEL_METRICS_UP_STEADY_INTERVAL_SECONDS:300}
      up-change-interval-seconds: ${SENTINEL_METRICS_UP_CHANGE_INTERVAL_SECONDS:90}
      incident-interval-seconds: ${SENTINEL_METRICS_INCIDENT_INTERVAL_SECONDS:20}
      max-silent-interval-seconds: ${SENTINEL_METRICS_MAX_SILENT_INTERVAL_SECONDS:900}
      delta:
        cpu: ${SENTINEL_METRICS_DELTA_CPU:2.0}
        memory: ${SENTINEL_METRICS_DELTA_MEMORY:2.0}
        disk: ${SENTINEL_METRICS_DELTA_DISK:1.0}
        network-in: ${SENTINEL_METRICS_DELTA_NETWORK_IN:1024.0}
        network-out: ${SENTINEL_METRICS_DELTA_NETWORK_OUT:1024.0}
    rollup:
      enabled: ${SENTINEL_METRICS_ROLLUP_ENABLED:true}
      lookback-minutes: ${SENTINEL_METRICS_ROLLUP_LOOKBACK_MINUTES:180}
      job:
        one-minute:
          fixed-delay-ms: ${SENTINEL_METRICS_ROLLUP_1M_DELAY_MS:60000}
        fifteen-minute:
          fixed-delay-ms: ${SENTINEL_METRICS_ROLLUP_15M_DELAY_MS:300000}
    retention:
      enabled: ${SENTINEL_METRICS_RETENTION_ENABLED:true}
      raw-days: ${SENTINEL_METRICS_RETENTION_RAW_DAYS:7}
      rollup-1m-days: ${SENTINEL_METRICS_RETENTION_ROLLUP_1M_DAYS:90}
      rollup-15m-days: ${SENTINEL_METRICS_RETENTION_ROLLUP_15M_DAYS:365}
      batch-size: ${SENTINEL_METRICS_RETENTION_BATCH_SIZE:1000}
      job:
        fixed-delay-ms: ${SENTINEL_METRICS_RETENTION_DELAY_MS:3600000}
