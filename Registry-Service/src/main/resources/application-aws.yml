server:
  port: 8081

spring:
  application:
    name: Registry-Service
  
  # Database configuration for AWS RDS
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:sentinel}?useSSL=true&requireSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    hikari:
      initialization-fail-timeout: 60000
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 30000
  
  jpa:
    hibernate:
      ddl-auto: validate  # Use Flyway for production
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  
  # Redis configuration for AWS ElastiCache
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    timeout: 2000ms

# Management and metrics configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: ${spring.application.name}
      environment: aws

# Registry service configuration
registry:
  # Recovery configuration
  recovery:
    # Enable EC2 recovery strategy for AWS deployment
    ec2:
      enabled: true
    
    # Default recovery policy
    default:
      max-restart-attempts: 3
      quarantine-duration-ms: 1200000  # 20 minutes
      preferred-recovery-actions: RESTART,START
  
  # Notification configuration
  notification:
    type: ${NOTIFICATION_TYPE:log}  # Options: log, webhook, sns
    webhook:
      url: ${WEBHOOK_URL:}  # Webhook URL for notifications
  
  # Failure detection configuration
  failure-detection:
    default-heartbeat-threshold-ms: 30000  # 30 seconds
    grace-period-ms: 60000  # 60 seconds for new instances
    suspect-threshold: 2
    unresponsive-threshold: 4
    check-interval-ms: 10000  # Run failure detector every 10 seconds

# AWS configuration
aws:
  region: ${AWS_REGION:us-east-1}

# Logging configuration
logging:
  level:
    com.project.Registry_Service: INFO
    com.project.Registry_Service.Scheduler.FailureDetector: DEBUG
    com.project.Registry_Service.Services.RecoveryService: DEBUG
    io.github.resilience4j: INFO
  file:
    name: /var/log/registry-service.log